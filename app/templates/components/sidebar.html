<!-- SIDEBAR: switch Inicio/Código + secciones condicionales (drawer en móvil, fijo en desktop) -->
<aside id="chat-sidebar"
  class="w-56 shrink-0 holo-card-3d rounded-r-xl rounded-l-none flex flex-col fixed top-12 bottom-0 left-0 z-30 -translate-x-full transition-transform duration-200 md:static md:top-auto md:bottom-auto md:translate-x-0 md:z-auto">

  <!-- BRAND: logo + subtítulo -->
  <div class="flex items-center gap-2 px-3 pt-3 pb-2 shrink-0 cursor-pointer" data-testid="logo-home" onclick="Cosmo.goHome()">
    <div class="core-logo shrink-0 scale-[0.42] -m-3.5"></div>
    <div class="flex flex-col leading-tight -ml-1.5">
      <span class="text-xs font-heading font-bold tracking-[0.16em] text-zinc-100">T.H.E.M.I.S.</span>
      <span class="text-[8.5px] text-zinc-500 uppercase tracking-widest">Sistema agéntico</span>
    </div>
  </div>

  <!-- MODE SWITCH: Inicio / Código -->
  <div class="px-3 pb-2 pt-1 shrink-0">
    <div class="flex bg-zinc-100 rounded-lg p-1 border border-zinc-200 gap-1" id="sidebar-mode-toggle">
      <button onclick="Cosmo.setSidebarMode('home')" data-testid="sidebar-mode-home" id="sidebar-mode-home-btn"
        class="sidebar-mode-btn flex-1 flex items-center justify-center gap-1 px-1.5 py-1.5 rounded-md text-[11px] font-medium transition-all bg-transparent cursor-pointer border-0">
        <i data-lucide="house" class="w-3.5 h-3.5"></i> Inicio
      </button>
      <button onclick="Cosmo.setSidebarMode('code')" data-testid="sidebar-mode-code" id="sidebar-mode-code-btn"
        class="sidebar-mode-btn flex-1 flex items-center justify-center gap-1 px-1.5 py-1.5 rounded-md text-[11px] font-medium transition-all bg-transparent cursor-pointer border-0">
        <i data-lucide="code-2" class="w-3.5 h-3.5"></i> Código
      </button>
    </div>
  </div>

  <!-- INICIO: navegación general -->
  <div id="sidebar-home-section" class="flex-1 min-h-0 flex flex-col">
    <div class="px-2 pb-1 flex flex-col gap-0.5">
      <button onclick="Cosmo.showDashboardPanel()" data-testid="nav-dashboard" id="nav-dashboard-btn"
        class="side-nav-item">
        <span class="side-nav-icon"><i data-lucide="gauge" class="w-4 h-4"></i></span>
        <span class="side-nav-label">Dashboard</span>
      </button>
      <button onclick="Cosmo.showNewsPanel()" data-testid="nav-news" id="nav-news-btn"
        class="side-nav-item">
        <span class="side-nav-icon"><i data-lucide="newspaper" class="w-4 h-4"></i></span>
        <span class="side-nav-label">Noticias</span>
      </button>
      <button onclick="Cosmo.showGalleryPanel()" data-testid="nav-gallery" id="nav-gallery-btn"
        class="side-nav-item">
        <span class="side-nav-icon"><i data-lucide="image" class="w-4 h-4"></i></span>
        <span class="side-nav-label">Galería</span>
      </button>
    </div>
    <div class="px-3 pb-2 pt-2 data-label">Recientes</div>
    <div id="chat-list" class="flex-1 overflow-y-auto px-2 pb-3 flex flex-col gap-0.5"></div>
  </div>

  <!-- CÓDIGO: modo Construir (proyectos) -->
  <div id="sidebar-code-section" class="hidden flex-1 min-h-0 flex-col">
    <div class="px-3 pb-1 pt-2">
      <button onclick="Cosmo.goHome()" data-testid="new-project" id="nav-new-project-btn"
        class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-semibold text-zinc-900 bg-sage-500 hover:bg-sage-600 transition-all cursor-pointer border-0 shadow-sm">
        <i data-lucide="plus" class="w-4 h-4"></i> Nuevo Proyecto
      </button>
    </div>
    <div class="px-3 pb-2 pt-2 data-label">Proyectos</div>
    <div id="sidebar-project-list" class="flex-1 overflow-y-auto px-2 pb-3 flex flex-col gap-0.5"></div>
  </div>
</aside>
