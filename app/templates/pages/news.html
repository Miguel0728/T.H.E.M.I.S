<!-- NOTICIAS -->
<main id="chat-news" class="hidden flex-1 flex flex-col overflow-hidden bg-white relative">
  <div class="shrink-0 flex items-center justify-between px-6 py-4 border-b border-zinc-200">
    <!-- Filtro minimalista tipo pill-group -->
    <div class="mode-switch !grid-cols-3 !inline-grid">
      <button id="news-tab-all" data-testid="news-tab-all" onclick="Cosmo.loadNews('all')"
        class="news-tab-btn mode-pill text-xs font-medium px-4 py-1.5 rounded-full transition-all duration-200">
        Todas
      </button>
      <button id="news-tab-us" data-testid="news-tab-us" onclick="Cosmo.loadNews('us')"
        class="news-tab-btn mode-pill text-xs font-medium px-4 py-1.5 rounded-full transition-all duration-200">
        Estados Unidos
      </button>
      <button id="news-tab-pr" data-testid="news-tab-pr" onclick="Cosmo.loadNews('pr')"
        class="news-tab-btn mode-pill text-xs font-medium px-4 py-1.5 rounded-full transition-all duration-200">
        Puerto Rico
      </button>
    </div>
    <button onclick="Cosmo.loadNews()" title="Actualizar"
      class="p-1.5 hover:bg-zinc-100 rounded-md transition-colors text-zinc-400 hover:text-zinc-700">
      <i data-lucide="rotate-cw" class="w-4 h-4"></i>
    </button>
  </div>
  <div id="news-grid" class="flex-1 overflow-y-auto p-6"></div>
</main>
