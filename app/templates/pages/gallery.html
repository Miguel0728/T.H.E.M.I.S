<!-- GALERÍA (Imágenes creadas por IA) -->
<main id="chat-gallery" class="hidden flex-1 flex flex-col overflow-hidden bg-white relative">
  <div class="shrink-0 flex items-center justify-between px-6 py-4 border-b border-zinc-200">
    <h2 class="text-sm font-semibold uppercase tracking-wider text-zinc-500 flex items-center gap-2">
      <i data-lucide="image" class="w-4 h-4 text-cyan-400 animate-pulse"></i> Galería de Creaciones
    </h2>
    <button onclick="Cosmo.loadGallery()" title="Actualizar"
      class="p-1.5 hover:bg-zinc-100 rounded-md transition-colors text-zinc-400 hover:text-zinc-700">
      <i data-lucide="rotate-cw" class="w-4 h-4"></i>
    </button>
  </div>
  <!-- Grid de imágenes similar al grid de noticias -->
  <div id="gallery-grid" class="flex-1 overflow-y-auto p-6"></div>
</main>
